name: 00981A Daily Update

on:
  schedule:
    - cron: '0 9 * * 1-5' # 台灣時間週一至五 17:00 執行
  workflow_dispatch: # 允許手動點擊執行測試

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests openpyxl tabulate

      - name: Run Update Script
        run: python update_data.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Update 00981A report $(date +'%Y-%m-%d')" || exit 0
          git push
